services:
  postgres:
    image: postgres:16-alpine
    container_name: veridion-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: veridion_api
    volumes:
      - veridion_api_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veridion-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: 
      RUST_ENV: production
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.veridion-nexus.eu}
    container_name: veridion-dashboard
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.veridion-nexus.eu}
    ports:
      - "3000:3000"
    restart: unless-stopped

  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
      args:
        NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL:-https://app.veridion-nexus.eu}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.veridion-nexus.eu}
    container_name: veridion-landing
    environment:
      NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL:-https://app.veridion-nexus.eu}
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  veridion_api_data:
